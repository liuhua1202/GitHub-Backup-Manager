name: build-windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Sanity check
        run: |
          # 绝不允许敏感文件进 release 工作流；这里把任何漏网 config.json 拒之门外
          if (Test-Path config.json) { throw "config.json exists in working dir — refusing to build!" }
          python -c "import app, backup_engine; print('import OK')"

      - name: PyInstaller
        run: |
          pyinstaller --onefile --windowed --name GitHubBackupManager `
                      --add-data "logo.ico;." `
                      app.py

      - name: Zip artefact
        run: |
          $version = "${{ github.ref_name }}"
          if (-not $version) { $version = "dev" }
          $out = "GitHub-Backup-Manager-$version-windows-x86_64.zip"
          Compress-Archive -Path dist/GitHubBackupManager.exe `
                          -DestinationPath $out `
                          -Force
          Get-ChildItem $out

      - name: Upload artefact
        uses: actions/upload-artifact@v5
        with:
          name: windows-x86_64
          path: '*.zip'

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v5
        with:
          name: windows-x86_64

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          generate_release_notes: true
          draft: false
